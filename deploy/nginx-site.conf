# ETD-XAI Enterprise — Nginx site (reverse proxy + SPA)
# Place at /etc/nginx/sites-available/etd-xai and symlink into sites-enabled.
# For HTTPS, run: sudo certbot --nginx -d your-domain.com

server {
    listen 80;
    server_name your-domain.com;

    client_max_body_size 500M;

    # ── React SPA (built to /opt/etd-xai/frontend/dist) ──────────
    root /opt/etd-xai/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API → FastAPI (Gunicorn on :8000) ────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml;
    gzip_min_length 1000;
}
