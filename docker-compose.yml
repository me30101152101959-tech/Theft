services:

  # ── FastAPI Backend (Uvicorn) ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: etd_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - TF_CPP_MIN_LOG_LEVEL=3
      # Persist the SQLite DB on a named volume (survives rebuilds/restarts)
      - DATABASE_PATH=/data/etd_xai.db
      - MODEL_PATH=/app/uploads/model/cnnlstm_final.keras
    volumes:
      - ./backend/uploads:/app/uploads      # models + datasets persist
      - etd_db:/data                        # SQLite database persists
      - etd_logs:/var/log/etd-xai           # logs persist
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── React Frontend + Nginx reverse proxy ────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: etd_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  etd_db:
  etd_logs:
